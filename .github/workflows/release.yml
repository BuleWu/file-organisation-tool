name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stamp version from tag
        shell: bash
        run: printf '"""Application version (set from the release tag)."""\nVERSION = "%s"\n' "${GITHUB_REF_NAME#v}" > src/version.py

      - name: Build executable
        run: pyinstaller --noconfirm --clean FileOrganiser.spec

      - name: Name the executable with the version
        shell: bash
        run: mv dist/FileOrganiser.exe "dist/FileOrganiser-${GITHUB_REF_NAME#v}.exe"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/FileOrganiser-*.exe
          generate_release_notes: true
